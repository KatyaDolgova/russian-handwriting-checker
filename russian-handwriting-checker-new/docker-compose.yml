services:
  backend:
    build:
      context: ./python-service
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - ./python-service/.env
    environment:
      OLLAMA_BASE_URL: http://ollama:11434/v1
    volumes:
      - paddleocr_models:/root/.paddleocr
    depends_on:
      - ollama

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend

  ollama:
    image: ollama/ollama:latest
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama

volumes:
  ollama_data:
  paddleocr_models:
